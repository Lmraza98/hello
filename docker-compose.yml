version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      LEADFORGE_ENABLE: '1'
      LEADFORGE_SALESFORCE_ENABLED: '0'
      TAVILY_ENABLED: 'true'
    ports:
      - '8000:8000'
    volumes:
      - ./data:/app/data
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    profiles: ['with-ollama']
    ports:
      - '11434:11434'
    volumes:
      - ollama-data:/root/.ollama

volumes:
  ollama-data:
